# Name of the CI/CD pipeline
name: CICD Pipeline

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Jobs are used to run tasks in isolated environments
jobs:

  # Compile job is responsible for building the Java application
  compile:
    runs-on: self-hosted

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 on the GitHub runner
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Compile the Maven project and validate the source code
      - name: Build with Maven
        run: mvn compile

  # Security-check job performs vulnerability and secret scanning
  security-check:
    runs-on: self-hosted
    needs: compile

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 for Maven dependency resolution
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Download all Maven dependencies before performing security scans
      - name: Resolve Maven Dependencies
        run: mvn dependency:resolve

      # Install Trivy vulnerability scanner on the GitHub runner
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install wget gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install trivy -y

      # Scan the repository file system for vulnerabilities and misconfigurations using Trivy
      - name: Trivy FS Scan
        run: |
          trivy fs --scanners vuln --format table .
          trivy fs --scanners vuln --format table -o fs-report.txt .

      # Install Gitleaks to detect hardcoded secrets in the repository
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      # Scan the source code for secrets and generate reports using Gitleaks
      - name: Gitleaks Code Scan
        run: |
          gitleaks detect --source . -f json || true
          gitleaks detect --source . -r gitleaks-report.json -f json || true

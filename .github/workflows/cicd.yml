# Name of the CI/CD pipeline
name: CICD Pipeline

# Trigger the workflow on push and pull request events for the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Jobs are used to run tasks in isolated environments
jobs:

  # Compile job is responsible for building the Java application
  compile:
    runs-on: self-hosted

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 on the GitHub runner
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Compile the Maven project and validate the source code
      - name: Build with Maven
        run: mvn compile

  # Security-check job performs vulnerability and secret scanning
  security-check:
    runs-on: self-hosted
    needs: compile

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 for Maven dependency resolution
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Download all Maven dependencies before performing security scans
      - name: Resolve Maven Dependencies
        run: mvn dependency:resolve

      # Install Trivy vulnerability scanner on the GitHub runner
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install wget gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install trivy -y

      # Scan the repository file system for vulnerabilities and misconfigurations using Trivy
      - name: Trivy FS Scan
        run: |
          trivy fs --scanners vuln --format table .
          trivy fs --scanners vuln --format table -o fs-report.txt .

      # Install Gitleaks to detect hardcoded secrets in the repository
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.24.2_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      # Scan the source code for secrets and generate reports using Gitleaks
      - name: Gitleaks Code Scan
        run: |
          gitleaks detect --source . -f json || true
          gitleaks detect --source . -r gitleaks-report.json -f json || true

  test:
    runs-on: self-hosted
    needs: security-check

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 on the GitHub runner
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Compile the Maven project and validate the source code
      - name: Unit Test Cases
        run: mvn test

  build_project_sonar_scan:
    runs-on: self-hosted
    needs: test

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install and configure JDK 17 on the GitHub runner
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Compile the Maven project and validate the source code
      - name: Build project
        run: mvn package

      # Uploads the generated JAR file as a GitHub Actions artifact for use in later stages of the pipeline.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - uses: actions/checkout@v6
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 1200
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} #OPTIONAL

      # Compile the Maven project and validate the source code
      - name: Unit Test Cases
        run: mvn test

  # Builds the Docker image and pushes it to the container registry after the build and SonarQube scan stages complete successfully.
  build_docker_image_and_push:
    runs-on: self-hosted
    needs: build_project_sonar_scan

    steps:
      # Checkout the source code from the GitHub repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download the JAR artifact generated in the previous build job.
      - name: Download JAR artfact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app # this will dowload JAR to ./app folder

      # Authenticate with Docker Hub using GitHub variables and secrets.
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up QEMU to enable multi-platform Docker image builds.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Set up Docker Buildx for advanced Docker build capabilities.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build the Docker image and push it to Docker Hub.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: karthik/bankapp:latest
